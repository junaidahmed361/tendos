launcher:
  type: docker
  image: tendos/mle-interview-tutor:0.1.2
  build:
    context: .
    dockerfile: harness/Dockerfile
  env:
    OLLAMA_MODEL: qwen2.5-coder:3b
  volumes:
    - tendos-mle-ollama:/root/.ollama
  command: hermes
  args:
    - "chat"
    - "-q"
    - "Teach Arrays & Hashing for MLE interview prep with subtopic counter 1/14 and ask 3 warmup recall questions."
    - "-m"
    - "ollama/qwen2.5-coder:3b"
    - "-Q"

security_guardrails:
  - prompt_injection_detection
  - tool_allowlist
  - local_filesystem_scope

pii_redaction:
  enabled: true
  strategy: mask
  entities:
    - email
    - phone
    - ssn
    - credit_card

update_sync:
  strategy: signed_pull
  interval: weekly
  signed_updates_required: true
